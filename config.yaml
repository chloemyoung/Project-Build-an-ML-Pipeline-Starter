main:
  components_repository: "components"

  # W&B project info
  project_name: nyc_airbnb
  experiment_name: development

  # Pipeline steps
  steps: all

etl:
  # Raw dataset artifact
  sample: "sample1.csv"

  # Output artifact after cleaning
  clean_sample: "clean_sample.csv"

  # Price filtering
  min_price: 10
  max_price: 350

  # Train/test split settings
  test_size: 0.2
  random_seed: 42
  stratify_by: "neighbourhood_group"

  # Output artifacts created by data_split
  trainval_data: "trainval_data.csv"
  test_data: "test_data.csv"

data_check:
  kl_threshold: 0.2

modeling:

  # TFIDF feature limit
  max_tfidf_features: 5

  # Random seed for training
  random_seed: 42

  # Model artifact name (used in regression test)
  export_artifact: "random_forest_export:prod"

  random_forest:
    n_estimators: 100
    max_depth: 15
    min_samples_split: 4
    min_samples_leaf: 3
    n_jobs: -1
    criterion: squared_error
    max_features: 0.5

    # DO NOT change
    oob_score: true